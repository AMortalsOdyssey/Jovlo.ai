<!doctype html>
<html lang="zh-CN">
  <body style="margin:0;background:#f8f2e9;color:#2d251d;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:32px 16px">
      <tr><td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#fff;border:1px solid #ead9c5">
          <tr><td style="padding:32px">
            <div style="font-size:18px;font-weight:700;color:#c25518">Jovlo</div>
            <h1 style="margin:28px 0 12px;font-size:26px;line-height:1.35">验证你的邮箱</h1>
            <p style="margin:0;color:#74685b;line-height:1.8">你正在为 Jovlo 创建账号。完成验证后，就可以保存和同步自己的路书。</p>
            <p style="margin:28px 0">
              <a href="https://jovlo.8xd.io/auth/confirm?token_hash={{ .TokenHash }}&amp;type=email&amp;returnTo=/trips" style="display:inline-block;padding:13px 22px;color:#fff;background:#c25518;text-decoration:none;font-weight:700">验证邮箱</a>
            </p>
            <p style="margin:0;color:#8b7e70;font-size:13px;line-height:1.7">该链接在 1 小时内有效。如果不是你本人操作，可以忽略这封邮件。</p>
            <hr style="margin:28px 0;border:0;border-top:1px solid #ead9c5">
            <p style="margin:0;color:#9a8f84;font-size:12px">此邮件由 jovlo.8xd.io 的账号服务发送。</p>
          </td></tr>
        </table>
      </td></tr>
    </table>
  </body>
</html>
